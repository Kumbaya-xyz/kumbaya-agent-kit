name: publish

# Publishes to npm on a version tag (e.g. v0.2.0), using npm Trusted Publishing
# (OIDC). No NPM_TOKEN secret: auth is a short-lived OIDC exchange tied to this
# repo and workflow, and provenance is attached automatically.
#
# Release flow:
#   npm version patch        # bumps package.json + creates the tag
#   git push --follow-tags

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for Trusted Publishing (OIDC)

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG  tag=$TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Sanity check the built server
        run: |
          out="$(printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            | node dist/index.js 2>/dev/null)"
          echo "$out" | grep -q '"tools"' || { echo "::error::server did not return a tools list"; exit 1; }

      - name: Upgrade npm for Trusted Publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Publish to npm
        run: npm publish --provenance --access public
