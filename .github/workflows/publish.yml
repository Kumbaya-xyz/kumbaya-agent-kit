name: publish

# Publishes changed packages to npm on a version tag (e.g. v0.2.0) using npm
# Trusted Publishing (OIDC). No NPM_TOKEN: auth is a short-lived OIDC exchange
# tied to this repo + workflow, and provenance is attached automatically.
#
# Release flow (bump the package you changed, then tag + push):
#   (cd packages/<pkg> && npm version patch)
#   git commit -am "release" && git tag v<date-or-number> && git push --follow-tags
# Any package whose version is already on npm is skipped.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for Trusted Publishing (OIDC)

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Publish changed packages (OIDC trusted publishing)
        run: |
          npm install -g npm@latest
          npm --version
          for dir in packages/onchain-mcp packages/api-mcp packages/signer; do
            name="$(node -p "require('./$dir/package.json').name")"
            version="$(node -p "require('./$dir/package.json').version")"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "· $name@$version already published — skipping"
            else
              echo "· publishing $name@$version"
              (cd "$dir" && npm publish)
            fi
          done
